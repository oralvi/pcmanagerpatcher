name: Build and Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Setup MSVC
      uses: ilammy/msvc-dev-cmd@v1
      with:
        arch: x64
    
    - name: Restore dependencies
      run: dotnet restore src/PCManagerPatcher.csproj
    
    - name: Build and publish
      run: dotnet publish src/PCManagerPatcher.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -p:PublishTrimmed=false -o artifacts
    
    - name: Get version from tag
      id: get_version
      run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $env:GITHUB_OUTPUT
    
    - name: Verify executable
      run: |
        dir artifacts
    
    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: artifacts/PCManagerPatcher.exe
        draft: false
        prerelease: false
        body: |
          # PCManagerPatcher ${{ steps.get_version.outputs.VERSION }}
          
          ## Download
          - `PCManagerPatcher.exe` - Self-contained Windows x64 executable (no .NET runtime required)
          
          ## Usage
          ```powershell
          .\PCManagerPatcher.exe
          ```
          
          ## Changes
          - See commit history for details
          
          ## How to use
          1. Download `PCManagerPatcher.exe`
          2. Run it and follow the prompts
          3. It will automatically locate your Xiaomi PC Manager installation
          4. Backup is created automatically
          5. Camera cooperation notifications will be suppressed
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
